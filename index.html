<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}
.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* CONTAINER */
.slider-container {
  width: 70%;
  margin: auto;
  overflow: hidden;
  position: relative;
}

/* SLIDER */
.slider {
  display: flex;
  will-change: transform;
  position: relative;
  height: 225px;
}

/* CARDS */
.card {
  position: absolute;
  left: 0;
  top: 0;
  flex: 0 0 260px;
  width: 260px;
  height: 225px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.25s ease, opacity 0.25s ease;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
}

.modal.show {
  display: flex;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <div class="logo">Frits <span>FURNITURE DESIGN</span></div>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">Portfolio</h2>

  <div class="slider-container" id="container">
    <div class="slider" id="slider"></div>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
const slider = document.getElementById('slider');
const container = document.getElementById('container');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

const sourceImages = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

/* 40 images long */
const images = Array.from({ length: 40 }, (_, i) => sourceImages[i % sourceImages.length]);

let cards = [];
let position = 0;
let speed = 0;
const MAX_SPEED = 35;

let cardWidth = 0;
let cardStep = 0;
let totalWidth = 0;
let baseOffset = 0;

/* BUILD */
images.forEach(src => {
  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = src;

  card.appendChild(img);
  slider.appendChild(card);
  cards.push(card);
});

function wrap(value, size) {
  return ((value % size) + size) % size;
}

function measure() {
  if (!cards.length) return;

  const firstCard = cards[0];
  const styles = getComputedStyle(firstCard);
  const marginLeft = parseFloat(styles.marginLeft);
  const marginRight = parseFloat(styles.marginRight);

  cardWidth = firstCard.offsetWidth;
  cardStep = cardWidth + marginLeft + marginRight;
  totalWidth = cardStep * cards.length;

  baseOffset = ((container.clientWidth - cardWidth) / 2) - (cardStep * 2);

  applyEffect();
}

window.addEventListener('load', measure);
window.addEventListener('resize', measure);

/* mouse control uses FULL SCREEN width,
   but only while cursor is within container height */
window.addEventListener('mousemove', (e) => {
  const rect = container.getBoundingClientRect();
  const insideContainerHeight = e.clientY >= rect.top && e.clientY <= rect.bottom;

  if (insideContainerHeight) {
    const percent = (e.clientX / window.innerWidth) - 0.5;
    speed = percent * MAX_SPEED;
  } else {
    speed = 0;
  }
});

window.addEventListener('mouseleave', () => {
  speed = 0;
});

/* animation */
function animate() {
  if (totalWidth) {
    position = wrap(position + speed, totalWidth);
    applyEffect();
  }

  requestAnimationFrame(animate);
}
animate();

/* EFFECT + TRUE INFINITE RING POSITIONING */
function applyEffect() {
  if (!totalWidth) return;

  const containerRect = container.getBoundingClientRect();
  const center = window.innerWidth / 2;

  cards.forEach((card, index) => {
    const ringX = wrap((index * cardStep) - position, totalWidth);
    const x = baseOffset + ringX;

    const c = containerRect.left + x + (cardWidth / 2);
    const dist = c - center;
    const abs = Math.abs(dist);

    let scale = 1 - (abs / 500);
    scale = Math.max(0.7, Math.min(1.15, scale));

    let y = Math.pow(dist / 200, 2) * 10;
    let rotate = dist / 25;

    card.style.left = `${x}px`;
    card.style.transform = `
      translateY(${y}px)
      scale(${scale})
      rotateY(${rotate}deg)
    `;

    card.style.opacity = 1 - (abs / 600);
    card.style.zIndex = Math.round(scale * 100);
  });
}

/* MODAL */
slider.addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG') {
    modal.classList.add('show');
    modalImg.src = e.target.src;
  }
});

modal.onclick = () => modal.classList.remove('show');
</script>

</body>
</html>
