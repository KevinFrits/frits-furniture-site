<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #111;
  overflow-x: hidden;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  top: -20%;
  left: 0;
  width: 100%;
  height: 140%;
  background-image: url("https://fritsfurnituredesign.com/Images/hero.jpg");
  background-size: cover;
  background-position: center 30%;
  transform: translateY(0);
}

.hero-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
}

.hero-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  text-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* LOGO */
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}

.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
  margin-top: 8px;
}

/* SECTIONS */
.section {
  padding: 100px 20px;
  max-width: 1100px;
  margin: auto;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* ===== SLIDER ===== */
.slider-wrap {
  position: relative;
}

.grid {
  display: flex;
  overflow-x: auto;
  gap: 20px;
  scroll-behavior: smooth;
  padding-bottom: 20px;
}

.grid::-webkit-scrollbar {
  display: none;
}

.card {
  flex: 0 0 340px;
  aspect-ratio: 4 / 3;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  transition: transform 0.3s ease, opacity 0.3s ease;
  transform: scale(0.8);
  opacity: 0.5;
}

.card img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ACTIVE STATES */
.card.active {
  transform: scale(1.15);
  opacity: 1;
  z-index: 3;
}

.card.near {
  transform: scale(0.95);
  opacity: 0.8;
  z-index: 2;
}

/* HOVER ZONES */
.hover-zone {
  position: absolute;
  top: 0;
  width: 100px;
  height: 100%;
  z-index: 5;
}

.hover-zone.left { left: 0; }
.hover-zone.right { right: 0; }

/* GRADIENT */
.hover-zone.left::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(255,255,255,0.95), transparent);
}

.hover-zone.right::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to left, rgba(255,255,255,0.95), transparent);
}

/* BEFORE AFTER */
.ba {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.ba img {
  width: 100%;
  max-width: 500px;
  border-radius: 12px;
}

/* CONTACT */
.contact {
  text-align: center;
  padding: 80px 20px;
  background: #f9f9f9;
}

button {
  padding: 14px 24px;
  border: none;
  background: #111;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1 class="logo">Frits <span>FURNITURE DESIGN</span></h1>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<!-- FEATURED -->
<div class="section fade">
  <h2>Featured Pieces</h2>

  <div class="slider-wrap">
    <div class="hover-zone left"></div>
    <div class="hover-zone right"></div>

    <div class="grid" id="slider">

      <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg" /></div>
      <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg" /></div>
      <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg" /></div>
      <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg" /></div>
      <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg" /></div>

    </div>
  </div>
</div>

<!-- BEFORE / AFTER -->
<div class="section fade">
  <h2>Restoration Work</h2>
  <div class="ba">
    <img src="https://fritsfurnituredesign.com/Images/PXL_20260412_014229567~2.jpg" />
    <img src="https://fritsfurnituredesign.com/Images/PXL_20251222_212118115~2.jpg" />
  </div>
</div>

<!-- CONTACT -->
<div class="contact fade">
  <h2>Interested in a piece?</h2>
  <p>Message me to check availability or custom work.</p>
  <button onclick="window.location.href='https://facebook.com'">
    Message on Facebook
  </button>
</div>

<script>
// fade-in
const elements = document.querySelectorAll('.fade');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.2 });
elements.forEach(el => observer.observe(el));

// parallax
const heroBg = document.querySelector('.hero-bg');
window.addEventListener('scroll', () => {
  heroBg.style.transform = `translateY(${window.scrollY * 0.3}px)`;
});

// ===== SCROLL =====
const slider = document.getElementById('slider');
const leftZone = document.querySelector('.hover-zone.left');
const rightZone = document.querySelector('.hover-zone.right');

let direction = 0;
let speed = 0;
const MAX_SPEED = 20;

function updateScroll() {
  if (direction !== 0) {
    slider.scrollLeft += direction * speed;
  }
  requestAnimationFrame(updateScroll);
}
updateScroll();

function handleMove(e, dir) {
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const width = rect.width;

  let intensity = dir === 1 ? x / width : 1 - (x / width);
  speed = Math.max(2, intensity * MAX_SPEED);
  direction = dir;
}

function stopScroll() {
  direction = 0;
  speed = 0;
}

rightZone.addEventListener('mousemove', (e) => handleMove(e, 1));
leftZone.addEventListener('mousemove', (e) => handleMove(e, -1));
rightZone.addEventListener('mouseleave', stopScroll);
leftZone.addEventListener('mouseleave', stopScroll);

// ===== CENTER FOCUS EFFECT =====
const cards = document.querySelectorAll('.card');

slider.addEventListener('mousemove', (e) => {
  let closestIndex = 0;
  let closestDistance = Infinity;

  cards.forEach((card, index) => {
    const rect = card.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    const distance = Math.abs(e.clientX - center);

    if (distance < closestDistance) {
      closestDistance = distance;
      closestIndex = index;
    }
  });

  cards.forEach((card, index) => {
    card.classList.remove('active', 'near');

    if (index === closestIndex) {
      card.classList.add('active');
    } else if (Math.abs(index - closestIndex) === 1) {
      card.classList.add('near');
    }
  });
});
</script>

</body>
</html>
