<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* VIEWPORT */
.viewport {
  width: 70%;
  margin: auto;
  overflow: hidden;
  position: relative;
}

/* TRACK */
.track {
  display: flex;
  width: max-content;
  will-change: transform;
}

/* CARD */
.card {
  flex: 0 0 260px;
  height: 225px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="hero">
  <div class="logo">Frits Furniture Design</div>
</div>

<div class="section">
  <h2 style="text-align:center;">Portfolio</h2>

  <div class="viewport" id="viewport">
    <div class="track" id="track"></div>
  </div>
</div>

<script>
const track = document.getElementById('track');
const viewport = document.getElementById('viewport');

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// ===== BUILD (duplicate once) =====
for (let i = 0; i < 2; i++) {
  images.forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = src;

    card.appendChild(img);
    track.appendChild(card);
  });
}

// ===== STATE =====
let x = 0;
let velocity = 0;
const MAX_SPEED = 25;

// smooth physics
const lerp = (a, b, n) => a + (b - a) * n;

// ===== MOUSE CONTROLS =====
viewport.addEventListener('mousemove', (e) => {
  const rect = viewport.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;

  const target = (percent - 0.5) * MAX_SPEED;
  velocity = lerp(velocity, target, 0.1);
});

viewport.addEventListener('mouseleave', () => {
  velocity = lerp(velocity, 0, 0.2);
});

// ===== LOOP WIDTH (safe estimate) =====
let halfWidth = 0;

window.addEventListener('load', () => {
  halfWidth = track.scrollWidth / 2;
  x = halfWidth;
});

// ===== ANIMATION =====
function animate() {
  x += velocity;

  // 🔥 seamless infinite loop
  if (halfWidth && x >= halfWidth * 2) {
    x -= halfWidth;
  }

  if (halfWidth && x <= 0) {
    x += halfWidth;
  }

  track.style.transform = `translateX(${-x}px)`;

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
