<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}
.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* CONTAINER */
.slider-container {
  width: 70%;
  margin: auto;
  overflow: hidden;
}

/* TRACK */
.track {
  display: flex;
  align-items: center;
  transition: transform 0.4s ease;
}

/* CARDS */
.card {
  flex: 0 0 260px;
  height: 300px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}
.modal img {
  max-width: 90%;
  max-height: 90%;
}
.modal.show {
  display: flex;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <div class="logo">Frits <span>FURNITURE DESIGN</span></div>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">Featured Pieces</h2>

  <div class="slider-container" id="container">
    <div class="track" id="track"></div>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
const track = document.getElementById('track');
const container = document.getElementById('container');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

// ===== IMAGES =====
const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// ===== BUILD CARDS (lots for loop illusion) =====
let allCards = [];

for (let i = 0; i < 10; i++) {
  images.forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = src;

    card.appendChild(img);
    track.appendChild(card);
    allCards.push(card);
  });
}

let currentIndex = Math.floor(allCards.length / 2);
let currentTranslate = 0;
let lastHoveredIndex = -1;

// ===== CENTER FUNCTION =====
function centerCard(index) {
  if (index === lastHoveredIndex) return; // prevent repeat trigger

  const card = allCards[index];
  const rect = card.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();

  const offset =
    rect.left + rect.width / 2 -
    (containerRect.left + containerRect.width / 2);

  currentTranslate -= offset;
  track.style.transform = `translateX(${currentTranslate}px)`;

  currentIndex = index;
  lastHoveredIndex = index;

  applyEffects();
  maintainLoop();
}

// ===== LOOP RESET =====
function maintainLoop() {
  const total = allCards.length;

  if (currentIndex < total * 0.3) {
    currentIndex += total / 2;
    jumpWithoutAnimation();
  }

  if (currentIndex > total * 0.7) {
    currentIndex -= total / 2;
    jumpWithoutAnimation();
  }
}

function jumpWithoutAnimation() {
  track.style.transition = "none";

  const card = allCards[currentIndex];
  const rect = card.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();

  const offset =
    rect.left + rect.width / 2 -
    (containerRect.left + containerRect.width / 2);

  currentTranslate -= offset;
  track.style.transform = `translateX(${currentTranslate}px)`;

  requestAnimationFrame(() => {
    track.style.transition = "transform 0.4s ease";
  });
}

// ===== HOVER =====
allCards.forEach((card, index) => {
  card.addEventListener('mouseenter', () => {
    centerCard(index);
  });
});

// ===== EFFECTS =====
function applyEffects() {
  const center = window.innerWidth / 2;

  allCards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const cardCenter = rect.left + rect.width / 2;
    const dist = cardCenter - center;
    const abs = Math.abs(dist);

    let scale = 1 - (abs / 500);
    scale = Math.max(0.7, Math.min(1.2, scale));

    let y = Math.pow(dist / 200, 2) * 15;
    let rotate = dist / 25;

    card.style.transform = `
      translateY(${y}px)
      scale(${scale})
      rotateY(${rotate}deg)
    `;

    card.style.opacity = 1 - (abs / 600);
    card.style.zIndex = Math.round(scale * 100);
  });
}

// initial center
setTimeout(() => centerCard(currentIndex), 100);

// ===== MODAL =====
document.addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG') {
    modal.classList.add('show');
    modalImg.src = e.target.src;
  }
});

modal.onclick = () => modal.classList.remove('show');
</script>

</body>
</html>
