<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}

.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* CONTAINER */
.slider-container {
  width: 70%;
  height: 390px;
  margin: auto;
  overflow: hidden;
  position: relative;
}

/* SLIDER */
.slider {
  display: flex;
  will-change: transform;
  position: relative;
  height: 390px;
}

/* CARDS */
.card {
  position: absolute;
  left: 0;
  bottom: 0;
  flex: 0 0 280px;
  width: 280px;
  height: 225px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
  transform-origin: center bottom;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
}

.modal.show {
  display: flex;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <div class="logo">Frits <span>FURNITURE DESIGN</span></div>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">Portfolio</h2>

  <div class="slider-container" id="container">
    <div class="slider" id="slider"></div>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
const slider = document.getElementById('slider');
const container = document.getElementById('container');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

const sourceImages = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

/* 40 images long */
const images = Array.from({ length: 40 }, (_, i) => sourceImages[i % sourceImages.length]);

let cards = [];
let position = 0;
let speed = 0;
let isUserControlling = false;
let snapTarget = null;

const MAX_SPEED = 16;
const DEAD_ZONE = 0.1875;
const PEAK_ZONE = 0.40;
const OUTER_DEAD_ZONE = 0.90;

const SNAP_EASE_MIN = 0.075;
const SNAP_EASE_MAX = 0.16;
const SNAP_THRESHOLD = 0.1;

let cardWidth = 0;
let cardStep = 0;
let totalWidth = 0;
let cardMarginLeft = 0;
let cardMarginRight = 0;

/* BUILD */
images.forEach(src => {
  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = src;

  card.appendChild(img);
  slider.appendChild(card);
  cards.push(card);
});

function wrap(value, size) {
  return ((value % size) + size) % size;
}

function wrapCentered(value, size) {
  return wrap(value + size / 2, size) - (size / 2);
}

function measure() {
  if (!cards.length) return;

  const firstCard = cards[0];
  const styles = getComputedStyle(firstCard);

  cardMarginLeft = parseFloat(styles.marginLeft);
  cardMarginRight = parseFloat(styles.marginRight);
  cardWidth = firstCard.offsetWidth;
  cardStep = cardWidth + cardMarginLeft + cardMarginRight;
  totalWidth = cardStep * cards.length;

  position = wrap(position, totalWidth);

  if (!isUserControlling) {
    snapTarget = getClosestSnapTarget();
  }

  applyEffect();
}

function getClosestSnapTarget() {
  if (!totalWidth) return null;

  let closestIndex = 0;
  let closestDistance = Infinity;

  cards.forEach((card, index) => {
    const relativeX = wrapCentered((index * cardStep) - position, totalWidth);
    const distance = Math.abs(relativeX);

    if (distance < closestDistance) {
      closestDistance = distance;
      closestIndex = index;
    }
  });

  return wrap(closestIndex * cardStep, totalWidth);
}

function startSnap() {
  if (!totalWidth) return;

  if (snapTarget === null || isUserControlling) {
    snapTarget = getClosestSnapTarget();
  }

  isUserControlling = false;
  speed = 0;
}

window.addEventListener('load', measure);
window.addEventListener('resize', measure);

/* mouse control uses full screen width,
   but only while cursor is within container height */
window.addEventListener('mousemove', (e) => {
  const rect = container.getBoundingClientRect();
  const insideContainerHeight = e.clientY >= rect.top && e.clientY <= rect.bottom;

  if (!insideContainerHeight) {
    startSnap();
    return;
  }

  const normalized = (e.clientX - (window.innerWidth / 2)) / (window.innerWidth / 2);
  const clamped = Math.max(-1, Math.min(1, normalized));
  const distance = Math.abs(clamped);

  if (distance <= DEAD_ZONE || distance >= OUTER_DEAD_ZONE) {
    startSnap();
    return;
  }

  isUserControlling = true;
  snapTarget = null;

  let magnitude = 0;

  if (distance <= PEAK_ZONE) {
    const t = (distance - DEAD_ZONE) / (PEAK_ZONE - DEAD_ZONE);
    magnitude = MAX_SPEED * Math.pow(t, 2.1);
  } else {
    const t = (distance - PEAK_ZONE) / (OUTER_DEAD_ZONE - PEAK_ZONE);
    magnitude = MAX_SPEED * (1 - Math.pow(t, 0.8));
  }

  speed = Math.sign(clamped) * magnitude;
});

window.addEventListener('mouseleave', startSnap);

/* animation */
function animate() {
  if (totalWidth) {
    if (isUserControlling) {
      position = wrap(position + speed, totalWidth);
    } else if (snapTarget !== null) {
      const delta = wrapCentered(snapTarget - position, totalWidth);
      const normalizedDelta = Math.min(1, Math.abs(delta) / cardStep);
      const snapEase = SNAP_EASE_MIN + (SNAP_EASE_MAX - SNAP_EASE_MIN) * normalizedDelta;

      if (Math.abs(delta) > SNAP_THRESHOLD) {
        position = wrap(position + (delta * snapEase), totalWidth);
      } else {
        position = wrap(snapTarget, totalWidth);
        snapTarget = null;
      }
    }

    applyEffect();
  }

  requestAnimationFrame(animate);
}
animate();

/* EFFECT + TRUE INFINITE RING POSITIONING */
function applyEffect() {
  if (!totalWidth) return;

  const containerCenterX = container.clientWidth / 2;

  cards.forEach((card, index) => {
    const relativeX = wrapCentered((index * cardStep) - position, totalWidth);
    const x = containerCenterX - cardMarginLeft - (cardWidth / 2) + relativeX;
    const cardCenterX = x + cardMarginLeft + (cardWidth / 2);

    const dist = cardCenterX - containerCenterX;
    const abs = Math.abs(dist);
    const slotDistance = abs / cardStep;

    const centerBoost = 0.68 * Math.exp(-Math.pow(slotDistance / 0.82, 2));
    const neighborBoost = 0.18 * Math.exp(-Math.pow((slotDistance - 1) / 0.40, 2));
    const scaleX = 0.70 + centerBoost + neighborBoost;

    const centerHeightBoost = 0.24 * Math.exp(-Math.pow(slotDistance / 0.72, 2));
    const neighborHeightBoost = 0.06 * Math.exp(-Math.pow((slotDistance - 1) / 0.44, 2));
    const scaleY = scaleX + centerHeightBoost + neighborHeightBoost;

    const centerInfluence = Math.exp(-Math.pow(slotDistance / 0.95, 2));
    const neighborInfluence = 0.78 * Math.exp(-Math.pow((slotDistance - 1) / 0.48, 2));
    const visualInfluence = Math.max(centerInfluence, neighborInfluence);

    const centerLift = -10 * Math.exp(-Math.pow(slotDistance / 0.9, 2));
    const neighborLift = -24 * Math.exp(-Math.pow((slotDistance - 1) / 0.42, 2));
    const shoulderLift = -18 * Math.exp(-Math.pow((slotDistance - 1.8) / 1.0, 2));
    const y = Math.pow(dist / 250, 2) * 5.2 + centerLift + neighborLift + shoulderLift;

    const rotate = dist / 42;
    const opacity = 0.10 + (0.90 * Math.pow(visualInfluence, 1.35));

    card.style.left = `${x}px`;
    card.style.transform = `
      translateY(${y}px)
      scaleX(${scaleX})
      scaleY(${scaleY})
      rotateY(${rotate}deg)
    `;
    card.style.opacity = opacity;
    card.style.zIndex = Math.round((scaleY + visualInfluence) * 100);
  });
}

/* MODAL */
slider.addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG') {
    modal.classList.add('show');
    modalImg.src = e.target.src;
  }
});

modal.onclick = () => modal.classList.remove('show');
</script>

</body>
</html>
