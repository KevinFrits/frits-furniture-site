<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Carousel</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.12), transparent 30%),
        linear-gradient(180deg, #263246 0%, #141922 50%, #090c12 100%);
    }

    #container {
      position: relative;
      width: 100%;
      overflow: hidden;
      perspective: 1200px;
      cursor: ew-resize;
      padding: 48px 0 84px;
      -webkit-mask-image: linear-gradient(to right, transparent 0, black 10%, black 90%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0, black 10%, black 90%, transparent 100%);
    }

    #slider {
      display: flex;
      align-items: center;
      gap: 28px;
      width: max-content;
      will-change: transform;
      transform-style: preserve-3d;
      padding: 0 6vw;
    }

    .card {
      flex: 0 0 clamp(220px, 28vw, 360px);
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border-radius: 8px;
      background: #101010;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      transform-origin: center center;
      transition: transform 120ms linear, opacity 120ms linear;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      cursor: pointer;
    }

    #modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.82);
      z-index: 999;
    }

    #modal.show {
      display: flex;
    }

    #modalImg {
      max-width: min(92vw, 1200px);
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    @media (max-width: 700px) {
      #container {
        padding: 28px 0 56px;
        -webkit-mask-image: linear-gradient(to right, transparent 0, black 5%, black 95%, transparent 100%);
        mask-image: linear-gradient(to right, transparent 0, black 5%, black 95%, transparent 100%);
      }

      #slider {
        gap: 18px;
        padding: 0 4vw;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="slider"></div>
  </div>

  <div id="modal">
    <img id="modalImg" alt="Expanded carousel image" />
  </div>

  <script>
    const slider = document.getElementById("slider");
    const container = document.getElementById("container");
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");

    const images = [
      "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
      "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
      "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
    ];

    const COPIES = 6;
    const BASE_SPEED = 0.7;
    const MAX_EXTRA_SPEED = 1.6;

    let cards = [];
    let position = 0;
    let speed = BASE_SPEED;
    let loopWidth = 0;

    buildSlider();
    init();

    function buildSlider() {
      slider.innerHTML = "";

      for (let copy = 0; copy < COPIES; copy++) {
        images.forEach((src, index) => {
          const card = document.createElement("div");
          card.className = "card";

          const img = document.createElement("img");
          img.src = src;
          img.alt = `Carousel image ${index + 1}`;

          card.appendChild(img);
          slider.appendChild(card);
        });
      }

      cards = [...slider.querySelectorAll(".card")];
    }

    async function init() {
      await waitForImages();
      measureLoop();
      requestAnimationFrame(animate);
    }

    function waitForImages() {
      const imgs = [...slider.querySelectorAll("img")];

      return Promise.all(
        imgs.map((img) => {
          if (img.complete) return Promise.resolve();

          return new Promise((resolve) => {
            img.addEventListener("load", resolve, { once: true });
            img.addEventListener("error", resolve, { once: true });
          });
        })
      );
    }

    function measureLoop() {
      const firstCard = slider.children[0];
      const firstCardOfSecondSet = slider.children[images.length];

      if (!firstCard || !firstCardOfSecondSet) return;

      loopWidth = firstCardOfSecondSet.offsetLeft - firstCard.offsetLeft;
      position = -loopWidth;
      slider.style.transform = `translateX(${position}px)`;
      applyEffect();
    }

    function animate() {
      if (loopWidth) {
        position += speed;

        if (position >= 0) {
          position -= loopWidth;
        }

        slider.style.transform = `translateX(${position}px)`;
        applyEffect();
      }

      requestAnimationFrame(animate);
    }

    container.addEventListener("mousemove", (e) => {
      const rect = container.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      speed = BASE_SPEED + percent * MAX_EXTRA_SPEED;
    });

    container.addEventListener("mouseleave", () => {
      speed = BASE_SPEED;
    });

    window.addEventListener("resize", measureLoop);

    function applyEffect() {
      const rect = container.getBoundingClientRect();
      const center = rect.left + rect.width / 2;

      cards.forEach((card) => {
        const cardRect = card.getBoundingClientRect();
        const cardCenter = cardRect.left + cardRect.width / 2;
        const dist = cardCenter - center;
        const abs = Math.abs(dist);

        let scale = 1 - abs / 500;
        scale = Math.max(0.72, Math.min(1.12, scale));

        const y = Math.pow(dist / 220, 2) * 10;
        const rotate = dist / 28;
        const opacity = Math.max(0.28, 1 - abs / 650);

        card.style.transform = `
          translateY(${y}px)
          scale(${scale})
          rotateY(${rotate}deg)
        `;
        card.style.opacity = opacity;
        card.style.zIndex = Math.round(scale * 100);
      });
    }

    slider.addEventListener("click", (e) => {
      if (e.target.tagName === "IMG") {
        modalImg.src = e.target.src;
        modal.classList.add("show");
      }
    });

    modal.addEventListener("click", () => {
      modal.classList.remove("show");
      modalImg.src = "";
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        modal.classList.remove("show");
        modalImg.src = "";
      }
    });
  </script>
</body>
</html>
