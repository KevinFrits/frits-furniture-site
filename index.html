<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}
.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* CONTAINER */
.slider-container {
  width: 70%;
  margin: auto;
  overflow: hidden;
  position: relative;
  cursor: grab;
}

/* TRACK */
.track {
  display: flex;
  gap: 0;
  will-change: transform;
}

/* CARDS */
.card {
  flex: 0 0 260px;
  height: 300px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.25s ease, opacity 0.25s ease;
}
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}
.modal img {
  max-width: 90%;
  max-height: 90%;
}
.modal.show {
  display: flex;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <div class="logo">Frits <span>FURNITURE DESIGN</span></div>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">Featured Pieces</h2>

  <div class="slider-container" id="container">
    <div class="track" id="track"></div>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
const track = document.getElementById('track');
const container = document.getElementById('container');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

// ===== IMAGES =====
const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// ===== BUILD (duplicate for infinite) =====
let cards = [];

for (let i = 0; i < 3; i++) {
  images.forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = src;

    card.appendChild(img);
    track.appendChild(card);
    cards.push(card);
  });
}

// ===== DRAG SYSTEM =====
let isDown = false;
let startX;
let currentX = 0;

container.addEventListener('mousedown', e => {
  isDown = true;
  startX = e.clientX;
  container.style.cursor = 'grabbing';
});

window.addEventListener('mouseup', () => {
  isDown = false;
  container.style.cursor = 'grab';
  snapToCenter();
});

window.addEventListener('mousemove', e => {
  if (!isDown) return;

  const delta = e.clientX - startX;
  startX = e.clientX;

  currentX += delta;
  track.style.transform = `translateX(${currentX}px)`;

  applyEffects();
  infiniteLoop();
});

// ===== INFINITE LOOP =====
function infiniteLoop() {
  const width = track.scrollWidth / 3;

  if (currentX > width) {
    currentX -= width;
  }
  if (currentX < -width) {
    currentX += width;
  }
}

// ===== SNAP =====
function snapToCenter() {
  let closest = null;
  let closestDist = Infinity;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    const screenCenter = window.innerWidth / 2;

    const dist = Math.abs(center - screenCenter);

    if (dist < closestDist) {
      closestDist = dist;
      closest = card;
    }
  });

  if (closest) {
    const rect = closest.getBoundingClientRect();
    const offset = rect.left + rect.width / 2 - window.innerWidth / 2;
    currentX -= offset;

    track.style.transition = "transform 0.4s ease";
    track.style.transform = `translateX(${currentX}px)`;

    setTimeout(() => {
      track.style.transition = "none";
    }, 400);
  }
}

// ===== EFFECT =====
function applyEffects() {
  const center = window.innerWidth / 2;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const c = rect.left + rect.width / 2;
    const dist = c - center;
    const abs = Math.abs(dist);

    let scale = 1 - (abs / 500);
    scale = Math.max(0.7, Math.min(1.2, scale));

    let y = Math.pow(dist / 200, 2) * 15;
    let rotate = dist / 25;

    card.style.transform = `
      translateY(${y}px)
      scale(${scale})
      rotateY(${rotate}deg)
    `;

    card.style.opacity = 1 - (abs / 600);
    card.style.zIndex = Math.round(scale * 100);
  });
}

// ===== MODAL =====
cards.forEach(card => {
  card.addEventListener('click', () => {
    modal.classList.add('show');
    modalImg.src = card.querySelector('img').src;
  });
});

modal.onclick = () => modal.classList.remove('show');
</script>

</body>
</html>
