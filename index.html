<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  font-size: 42px;
}

/* viewport */
.wrap {
  width: 70%;
  margin: auto;
  overflow-x: auto;
  display: flex;
  scroll-behavior: smooth;
}

.wrap::-webkit-scrollbar {
  display: none;
}

/* cards */
.card {
  flex: 0 0 260px;
  height: 225px;
  margin: 0 -40px;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="hero">Frits Furniture Design</div>

<div class="wrap" id="wrap"></div>

<script>
const wrap = document.getElementById("wrap");

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// build (just duplicate for flow, no infinite logic)
for (let i = 0; i < 3; i++) {
  images.forEach(src => {
    const div = document.createElement("div");
    div.className = "card";

    const img = document.createElement("img");
    img.src = src;

    div.appendChild(img);
    wrap.appendChild(div);
  });
}

// simple mouse-driven scroll (NO physics, NO loop)
let lastX = 0;

document.addEventListener("mousemove", (e) => {
  const dx = e.clientX - lastX;
  lastX = e.clientX;

  wrap.scrollLeft += dx * 0.3;
});
</script>

</body>
</html>
