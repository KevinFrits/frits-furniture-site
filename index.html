<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}

.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* CONTAINER */
.slider-container {
  width: 70%;
  margin: auto;
  overflow: hidden;
  position: relative;
}

/* SLIDER */
.slider {
  display: flex;
  will-change: transform;
  position: relative;
  height: 225px;
}

/* CARDS */
.card {
  position: absolute;
  left: 0;
  top: 0;
  flex: 0 0 260px;
  width: 260px;
  height: 225px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.25s ease, opacity 0.25s ease;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
}

.modal.show {
  display: flex;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <div class="logo">Frits <span>FURNITURE DESIGN</span></div>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">Portfolio</h2>

  <div class="slider-container" id="container">
    <div class="slider" id="slider"></div>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
const slider = document.getElementById('slider');
const container = document.getElementById('container');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

const sourceImages = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

/* 40 images long */
const images = Array.from({ length: 40 }, (_, i) => sourceImages[i % sourceImages.length]);

let cards = [];
let position = 0;
let speed = 0;

const MAX_SPEED = 26;
const EDGE_SPEED = 5;
const DEAD_ZONE = 0.12;
const PEAK_ZONE = 0.28;
const SNAP_STRENGTH = 0.14;
const SNAP_THRESHOLD = 0.15;

let cardWidth = 0;
let cardStep = 0;
let totalWidth = 0;

/* BUILD */
images.forEach(src => {
  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = src;

  card.appendChild(img);
  slider.appendChild(card);
  cards.push(card);
});

function wrap(value, size) {
  return ((value % size) + size) % size;
}

function wrapCentered(value, size) {
  return wrap(value + size / 2, size) - (size / 2);
}

function measure() {
  if (!cards.length) return;

  const firstCard = cards[0];
  const styles = getComputedStyle(firstCard);
  const marginLeft = parseFloat(styles.marginLeft);
  const marginRight = parseFloat(styles.marginRight);

  cardWidth = firstCard.offsetWidth;
  cardStep = cardWidth + marginLeft + marginRight;
  totalWidth = cardStep * cards.length;

  position = wrap(position, totalWidth);
  applyEffect();
}

window.addEventListener('load', measure);
window.addEventListener('resize', measure);

/* mouse control uses full screen width,
   but only while cursor is within container height */
window.addEventListener('mousemove', (e) => {
  const rect = container.getBoundingClientRect();
  const insideContainerHeight = e.clientY >= rect.top && e.clientY <= rect.bottom;

  if (!insideContainerHeight) {
    speed = 0;
    return;
  }

  const normalized = (e.clientX - (window.innerWidth / 2)) / (window.innerWidth / 2);
  const clamped = Math.max(-1, Math.min(1, normalized));
  const distance = Math.abs(clamped);

  let magnitude = 0;

  if (distance > DEAD_ZONE && distance <= PEAK_ZONE) {
    const t = (distance - DEAD_ZONE) / (PEAK_ZONE - DEAD_ZONE);
    magnitude = MAX_SPEED * Math.pow(t, 1.35);
  } else if (distance > PEAK_ZONE) {
    const t = (distance - PEAK_ZONE) / (1 - PEAK_ZONE);
    magnitude = MAX_SPEED + (EDGE_SPEED - MAX_SPEED) * t;
  }

  speed = Math.sign(clamped) * magnitude;
});

window.addEventListener('mouseleave', () => {
  speed = 0;
});

/* animation */
function animate() {
  if (totalWidth) {
    if (Math.abs(speed) > 0.001) {
      position = wrap(position + speed, totalWidth);
    } else {
      const snapTarget = Math.round(position / cardStep) * cardStep;
      const delta = wrapCentered(snapTarget - position, totalWidth);

      if (Math.abs(delta) > SNAP_THRESHOLD) {
        position = wrap(position + delta * SNAP_STRENGTH, totalWidth);
      } else {
        position = wrap(snapTarget, totalWidth);
      }
    }

    applyEffect();
  }

  requestAnimationFrame(animate);
}
animate();

/* EFFECT + TRUE INFINITE RING POSITIONING */
function applyEffect() {
  if (!totalWidth) return;

  const containerRect = container.getBoundingClientRect();
  const viewportCenterX = window.innerWidth / 2;
  const localCenterX = viewportCenterX - containerRect.left;

  cards.forEach((card, index) => {
    const relativeX = wrapCentered((index * cardStep) - position, totalWidth);

    const x = localCenterX - (cardWidth / 2) + relativeX;
    const cardCenterX = containerRect.left + x + (cardWidth / 2);

    const dist = cardCenterX - viewportCenterX;
    const abs = Math.abs(dist);

    let scale = 1 - (abs / 500);
    scale = Math.max(0.7, Math.min(1.15, scale));

    const y = Math.pow(dist / 200, 2) * 10;
    const rotate = dist / 25;
    const opacity = Math.max(0, 1 - (abs / 600));

    card.style.left = `${x}px`;
    card.style.transform = `
      translateY(${y}px)
      scale(${scale})
      rotateY(${rotate}deg)
    `;
    card.style.opacity = opacity;
    card.style.zIndex = Math.round(scale * 100);
  });
}

/* MODAL */
slider.addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG') {
    modal.classList.add('show');
    modalImg.src = e.target.src;
  }
});

modal.onclick = () => modal.classList.remove('show');
</script>

</body>
</html>
