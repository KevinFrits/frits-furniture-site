<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}
.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
}

/* SECTION */
.section {
  padding: 100px 0;
}

/* CONTAINER */
.slider-container {
  width: 70%;
  margin: auto;
  overflow: hidden;
}

/* SLIDER */
.grid {
  display: flex;
  gap: 0;
  padding: 100px 0;
}

/* CARDS */
.card {
  flex: 0 0 340px;
  height: 440px;
  margin-left: -100px;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.card:first-child {
  margin-left: 0;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}
.modal img {
  max-width: 90%;
  max-height: 90%;
}
.modal.show {
  display: flex;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <div class="logo">Frits <span>FURNITURE DESIGN</span></div>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">Featured Pieces</h2>

  <div class="slider-container">
    <div class="grid" id="slider"></div>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
const slider = document.getElementById('slider');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

// ===== IMAGE LIST (ADD / CHANGE HERE) =====
const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg"
];

// ===== GENERATE CARDS =====
images.forEach(src => {
  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = src;

  card.appendChild(img);
  slider.appendChild(card);
});

// duplicate for infinite loop
slider.innerHTML += slider.innerHTML + slider.innerHTML;

// ===== AUTO SCROLL =====
let scrollX = 0;

function animate() {
  scrollX += 0.5;

  if (scrollX >= slider.scrollWidth / 3) {
    scrollX = 0;
  }

  slider.style.transform = `translateX(${-scrollX}px)`;
  applyEffect();

  requestAnimationFrame(animate);
}
animate();

// ===== RING EFFECT =====
function applyEffect() {
  const cards = document.querySelectorAll('.card');
  const center = window.innerWidth / 2;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const cardCenter = rect.left + rect.width / 2;
    const dist = cardCenter - center;
    const abs = Math.abs(dist);

    let scale = 1 - (abs / 600);
    scale = Math.max(0.6, Math.min(1.2, scale));

    let y = Math.pow(dist / 200, 2) * 20;
    let rotate = dist / 15;

    card.style.transform = `
      translateY(${y}px)
      scale(${scale})
      rotateY(${rotate}deg)
    `;

    card.style.opacity = 1 - (abs / 800);
    card.style.zIndex = Math.round(scale * 100);
  });
}

// ===== MODAL =====
document.addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG') {
    modal.classList.add('show');
    modalImg.src = e.target.src;
  }
});

modal.onclick = () => modal.classList.remove('show');
</script>

</body>
</html>
