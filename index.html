<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* CONTAINER */
.slider-container {
  width: 70%;
  margin: auto;
  overflow: hidden;
}

/* TRACK */
.track {
  display: flex;
  will-change: transform;
}

/* CARDS */
.card {
  flex: 0 0 260px;
  height: 225px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
}
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="hero">
  <div class="logo">Frits Furniture Design</div>
</div>

<div class="section">
  <h2 style="text-align:center;">Portfolio</h2>

  <div class="slider-container" id="container">
    <div class="track" id="track"></div>
  </div>
</div>

<script>
const track = document.getElementById('track');
const container = document.getElementById('container');

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

let position = 0;
let speed = 0;
const MAX_SPEED = 30;

let setWidth = 0;
let ready = false;

// ===== BUILD DOUBLE SET =====
function build() {
  images.concat(images).forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = src;

    track.appendChild(card);
    card.appendChild(img);
  });
}

build();

// ===== WAIT FOR IMAGES TO LOAD (IMPORTANT FIX) =====
window.addEventListener('load', () => {
  const cards = document.querySelectorAll('.card');

  // measure ONE full set reliably
  const singleSetCount = images.length;

  setWidth = 0;
  for (let i = 0; i < singleSetCount; i++) {
    setWidth += cards[i].offsetWidth;
  }

  position = setWidth; // start in middle set
  ready = true;
});

// ===== MOUSE CONTROL =====
container.addEventListener('mousemove', (e) => {
  const rect = container.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;

  speed = (x - 0.5) * MAX_SPEED;
});

container.addEventListener('mouseleave', () => {
  speed = 0;
});

// ===== LOOP ENGINE =====
function animate() {
  if (ready) {
    position += speed;

    // BIG SAFE LOOP ZONE (prevents glitch)
    if (position < setWidth * 0.5) {
      position += setWidth;
    }
    if (position > setWidth * 1.5) {
      position -= setWidth;
    }

    track.style.transform = `translateX(${-position}px)`;
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
