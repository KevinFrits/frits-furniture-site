<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}
.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* CONTAINER */
.slider-container {
  width: 70%;
  margin: auto;
  overflow: hidden;
  position: relative;
}

/* TRACK */
.track {
  display: flex;
  will-change: transform;
}

/* CARDS */
.card {
  flex: 0 0 260px;
  height: 225px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.2s ease, opacity 0.2s ease;
}
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}
.modal img {
  max-width: 90%;
  max-height: 90%;
}
.modal.show {
  display: flex;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <div class="logo">Frits <span>FURNITURE DESIGN</span></div>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">Portfolio</h2>

  <div class="slider-container" id="container">
    <div class="track" id="track"></div>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
const track = document.getElementById('track');
const container = document.getElementById('container');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// ===== BUILD TWO IDENTICAL SETS =====
function build() {
  images.concat(images).forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = src;

    card.appendChild(img);
    track.appendChild(card);
  });
}
build();

// ===== STATE =====
let position = 0;
let speed = 0;
const MAX_SPEED = 35;

// width of one full set (used for looping)
let setWidth = 0;

setTimeout(() => {
  const cards = document.querySelectorAll('.card');
  const singleSetCount = images.length;

  for (let i = 0; i < singleSetCount; i++) {
    setWidth += cards[i].offsetWidth;
  }

  position = setWidth;
}, 100);

// ===== MOUSE CONTROL =====
container.addEventListener('mousemove', (e) => {
  const rect = container.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;

  speed = (x - 0.5) * MAX_SPEED;
});

container.addEventListener('mouseleave', () => {
  speed = 0;
});

// ===== LOOP ENGINE =====
function animate() {
  position += speed;

  // seamless loop reset (invisible)
  if (position <= 0) {
    position += setWidth;
  }
  if (position >= setWidth * 2) {
    position -= setWidth;
  }

  track.style.transform = `translateX(${-position}px)`;

  applyEffect();
  requestAnimationFrame(animate);
}
animate();

// ===== VISUAL EFFECT =====
function applyEffect() {
  const cards = document.querySelectorAll('.card');
  const center = window.innerWidth / 2;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const c = rect.left + rect.width / 2;
    const dist = c - center;
    const abs = Math.abs(dist);

    let scale = 1 - (abs / 500);
    scale = Math.max(0.7, Math.min(1.15, scale));

    let y = Math.pow(dist / 200, 2) * 10;
    let rotate = dist / 25;

    card.style.transform = `
      translateY(${y}px)
      scale(${scale})
      rotateY(${rotate}deg)
    `;

    card.style.opacity = 1 - (abs / 600);
    card.style.zIndex = Math.round(scale * 100);
  });
}

// ===== MODAL =====
track.addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG') {
    modal.classList.add('show');
    modalImg.src = e.target.src;
  }
});

modal.onclick = () => modal.classList.remove('show');
</script>

</body>
</html>
