<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* VIEWPORT */
.viewport {
  width: 70%;
  margin: auto;
  overflow-x: scroll;
  overflow-y: hidden;
  display: flex;
  scroll-behavior: auto;
  cursor: grab;
}

.viewport::-webkit-scrollbar {
  display: none;
}

/* ITEM */
.card {
  flex: 0 0 260px;
  height: 225px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="hero">
  <div class="logo">Frits Furniture Design</div>
</div>

<div class="section">
  <h2 style="text-align:center;">Portfolio</h2>

  <div class="viewport" id="viewport"></div>
</div>

<script>
const viewport = document.getElementById('viewport');

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// ===== BUILD DOUBLE SET =====
function build() {
  for (let i = 0; i < 2; i++) {
    images.forEach(src => {
      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.src = src;

      card.appendChild(img);
      viewport.appendChild(card);
    });
  }
}
build();

// wait until layout exists
window.addEventListener('load', () => {
  viewport.scrollLeft = viewport.scrollWidth / 2;
});

// ===== MOUSE SPEED CONTROL =====
let speed = 0;

viewport.addEventListener('mousemove', (e) => {
  const rect = viewport.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;

  speed = (x - 0.5) * 25;
});

viewport.addEventListener('mouseleave', () => {
  speed = 0;
});

// ===== INFINITE LOOP ENGINE =====
function animate() {
  viewport.scrollLeft += speed;

  const half = viewport.scrollWidth / 2;

  // 🔥 true seamless loop
  if (viewport.scrollLeft >= half) {
    viewport.scrollLeft -= half;
  }

  if (viewport.scrollLeft <= 0) {
    viewport.scrollLeft += half;
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
