<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  color: white;
  text-align: center;
  background: #2a2a2a;
}

.hero-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.28);
}

.hero-content {
  position: relative;
  z-index: 1;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}

.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* CONTAINER */
.slider-container {
  width: 90%;
  margin: auto;
  overflow: hidden;
  position: relative;
  min-height: 390px;

  -webkit-mask-image: linear-gradient(
    to right,
    transparent 0%,
    rgba(0, 0, 0, 0.35) 4%,
    black 10%,
    black 90%,
    rgba(0, 0, 0, 0.35) 96%,
    transparent 100%
  );
  mask-image: linear-gradient(
    to right,
    transparent 0%,
    rgba(0, 0, 0, 0.35) 4%,
    black 10%,
    black 90%,
    rgba(0, 0, 0, 0.35) 96%,
    transparent 100%
  );
}

.slider-container::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 90px;
  pointer-events: none;
  z-index: 500;
  background: linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0) 0%,
    rgba(255, 255, 255, 0.7) 68%,
    #fff 100%
  );
}

/* SLIDER */
.slider {
  display: flex;
  will-change: transform;
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  min-height: 390px;
}

/* CARDS */
.card {
  position: absolute;
  left: 0;
  bottom: 0;
  flex: 0 0 280px;
  width: 280px;
  height: 225px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
  transform-origin: center bottom;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
  display: block;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 2000;
}

.modal.show {
  display: flex;
}

.modal-stage {
  position: relative;
  width: min(92vw, 1200px);
  height: min(88vh, 900px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal img {
  max-width: 100%;
  max-height: 100%;
  display: block;
  border-radius: 12px;
}

.modal-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 54px;
  height: 54px;
  border: 0;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
  color: white;
  font-size: 28px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}

.modal-arrow:hover {
  background: rgba(255,255,255,0.28);
}

.modal-arrow-left {
  left: 18px;
}

.modal-arrow-right {
  right: 18px;
}

.modal-count {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 14px;
  letter-spacing: 1px;
  background: rgba(0,0,0,0.35);
  padding: 8px 12px;
  border-radius: 999px;
}

@media (max-width: 700px) {
  .modal-arrow {
    width: 46px;
    height: 46px;
    font-size: 24px;
  }

  .modal-arrow-left {
    left: 8px;
  }

  .modal-arrow-right {
    right: 8px;
  }
}
</style>
</head>

<body>

<div class="hero">
  <img class="hero-bg" src="./images/hero-banner.jpg?v=1" alt="">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="logo">Frits <span>FURNITURE DESIGN</span></div>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">Portfolio</h2>

  <div class="slider-container" id="container">
    <div class="slider" id="slider"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-stage">
    <button class="modal-arrow modal-arrow-left" id="modalPrev" aria-label="Previous image">&#10094;</button>
    <img id="modalImg" alt="Expanded gallery image">
    <button class="modal-arrow modal-arrow-right" id="modalNext" aria-label="Next image">&#10095;</button>
    <div class="modal-count" id="modalCount"></div>
  </div>
</div>

<script>
const slider = document.getElementById('slider');
const container = document.getElementById('container');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const modalPrev = document.getElementById('modalPrev');
const modalNext = document.getElementById('modalNext');
const modalCount = document.getElementById('modalCount');

const IMAGE_EXT = "jpg";
const CAROUSEL_ITEM_COUNT = 40;

const portfolioConfig = [
  { id: 1, galleryCount: 4 },
  { id: 2, galleryCount: 3 },
  { id: 3, galleryCount: 5 },
  { id: 4, galleryCount: 2 }
];

const gallerySets = portfolioConfig.map((item) => ({
  thumb: `images/portfolio/${item.id}.${IMAGE_EXT}`,
  gallery: Array.from(
    { length: item.galleryCount },
    (_, index) => `images/portfolio/${item.id}/${index + 1}.${IMAGE_EXT}`
  )
}));

/* Restore the old repeated ring behavior */
const items = Array.from({ length: CAROUSEL_ITEM_COUNT }, (_, i) => {
  const set = gallerySets[i % gallerySets.length];
  return {
    thumb: set.thumb,
    gallery: set.gallery
  };
});

let cards = [];
let position = 0;
let speed = 0;
let isUserControlling = false;
let snapTarget = null;
let interactionEnabled = true;

let activeGallery = [];
let activeGalleryIndex = 0;

const MAX_SPEED = 16;
const DEAD_ZONE_RATIO = 0.1875;
const ACCELERATION_POWER = 1.9;
const DECELERATION_POWER = 0.85;

const SNAP_EASE_MIN = 0.075;
const SNAP_EASE_MAX = 0.16;
const SNAP_THRESHOLD = 0.1;

const BASE_CAROUSEL_HEIGHT = 390;
const BASE_TOP_ROOM = 40;
const OUTER_LIFT = -5;
const OUTER_LIFT_HEIGHT_FACTOR = 2;

let cardWidth = 0;
let cardStep = 0;
let totalWidth = 0;
let cardMarginLeft = 0;
let cardMarginRight = 0;

items.forEach((item, index) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.itemIndex = index;

  const img = document.createElement('img');
  img.src = item.thumb;
  img.alt = `Portfolio image ${index + 1}`;

  card.appendChild(img);
  slider.appendChild(card);
  cards.push(card);
});

function wrap(value, size) {
  return ((value % size) + size) % size;
}

function wrapCentered(value, size) {
  return wrap(value + size / 2, size) - (size / 2);
}

function measure() {
  if (!cards.length) return;

  const firstCard = cards[0];
  const styles = getComputedStyle(firstCard);

  cardMarginLeft = parseFloat(styles.marginLeft);
  cardMarginRight = parseFloat(styles.marginRight);
  cardWidth = firstCard.offsetWidth;
  cardStep = cardWidth + cardMarginLeft + cardMarginRight;
  totalWidth = cardStep * cards.length;

  const carouselHeight =
    BASE_CAROUSEL_HEIGHT +
    BASE_TOP_ROOM +
    (Math.abs(OUTER_LIFT) * OUTER_LIFT_HEIGHT_FACTOR);

  container.style.height = `${carouselHeight}px`;
  slider.style.height = `${carouselHeight}px`;

  position = wrap(position, totalWidth);

  if (!isUserControlling) {
    snapTarget = getClosestSnapTarget();
  }

  applyEffect();
}

function getClosestSnapTarget() {
  if (!totalWidth) return null;

  let closestIndex = 0;
  let closestDistance = Infinity;

  cards.forEach((card, index) => {
    const relativeX = wrapCentered((index * cardStep) - position, totalWidth);
    const distance = Math.abs(relativeX);

    if (distance < closestDistance) {
      closestDistance = distance;
      closestIndex = index;
    }
  });

  return wrap(closestIndex * cardStep, totalWidth);
}

function startSnap() {
  if (!totalWidth) return;

  if (snapTarget === null || isUserControlling) {
    snapTarget = getClosestSnapTarget();
  }

  isUserControlling = false;
  speed = 0;
}

function updateInteractionState() {
  interactionEnabled =
    document.visibilityState === 'visible' &&
    document.hasFocus() &&
    !modal.classList.contains('show');

  if (!interactionEnabled) {
    startSnap();
  }
}

function renderModalImage() {
  if (!activeGallery.length) return;

  modalImg.src = activeGallery[activeGalleryIndex];
  modalCount.textContent = `${activeGalleryIndex + 1} / ${activeGallery.length}`;

  const hasMultiple = activeGallery.length > 1;
  modalPrev.style.display = hasMultiple ? 'flex' : 'none';
  modalNext.style.display = hasMultiple ? 'flex' : 'none';
  modalCount.style.display = hasMultiple ? 'block' : 'none';
}

function openModalForItem(itemIndex) {
  const item = items[itemIndex];
  if (!item || !item.gallery || !item.gallery.length) return;

  activeGallery = item.gallery;
  activeGalleryIndex = 0;
  renderModalImage();
  modal.classList.add('show');
  updateInteractionState();
}

function closeModal() {
  modal.classList.remove('show');
  modalImg.src = '';
  activeGallery = [];
  activeGalleryIndex = 0;
  updateInteractionState();
}

function showPreviousModalImage() {
  if (activeGallery.length < 2) return;
  activeGalleryIndex = (activeGalleryIndex - 1 + activeGallery.length) % activeGallery.length;
  renderModalImage();
}

function showNextModalImage() {
  if (activeGallery.length < 2) return;
  activeGalleryIndex = (activeGalleryIndex + 1) % activeGallery.length;
  renderModalImage();
}

window.addEventListener('load', () => {
  measure();
  updateInteractionState();
});

window.addEventListener('resize', measure);
window.addEventListener('focus', updateInteractionState);
window.addEventListener('blur', updateInteractionState);
document.addEventListener('visibilitychange', updateInteractionState);

window.addEventListener('mousemove', (e) => {
  if (!interactionEnabled) return;

  const rect = container.getBoundingClientRect();
  const insideContainerHeight = e.clientY >= rect.top && e.clientY <= rect.bottom;

  if (!insideContainerHeight) {
    startSnap();
    return;
  }

  const containerCenterX = rect.left + (rect.width / 2);
  const deltaX = e.clientX - containerCenterX;
  const direction = Math.sign(deltaX);
  const distance = Math.abs(deltaX);

  const halfContainerWidth = rect.width / 2;
  const deadZonePx = halfContainerWidth * DEAD_ZONE_RATIO;

  if (distance <= deadZonePx) {
    startSnap();
    return;
  }

  isUserControlling = true;
  snapTarget = null;

  const distanceToViewportEdge = direction < 0
    ? containerCenterX
    : window.innerWidth - containerCenterX;

  let magnitude = 0;

  if (distance <= halfContainerWidth) {
    const t = (distance - deadZonePx) / Math.max(1, halfContainerWidth - deadZonePx);
    magnitude = MAX_SPEED * Math.pow(t, ACCELERATION_POWER);
  } else {
    const extraRange = Math.max(1, distanceToViewportEdge - halfContainerWidth);
    const t = Math.min(1, (distance - halfContainerWidth) / extraRange);
    magnitude = MAX_SPEED * (1 - Math.pow(t, DECELERATION_POWER));
  }

  speed = direction * magnitude;
});

window.addEventListener('mouseleave', startSnap);

function animate() {
  if (totalWidth) {
    if (isUserControlling && interactionEnabled) {
      position = wrap(position + speed, totalWidth);
    } else if (snapTarget !== null) {
      const delta = wrapCentered(snapTarget - position, totalWidth);
      const normalizedDelta = Math.min(1, Math.abs(delta) / cardStep);
      const snapEase = SNAP_EASE_MIN + (SNAP_EASE_MAX - SNAP_EASE_MIN) * normalizedDelta;

      if (Math.abs(delta) > SNAP_THRESHOLD) {
        position = wrap(position + (delta * snapEase), totalWidth);
      } else {
        position = wrap(snapTarget, totalWidth);
        snapTarget = null;
      }
    }

    applyEffect();
  }

  requestAnimationFrame(animate);
}
animate();

function applyEffect() {
  if (!totalWidth) return;

  const containerCenterX = container.clientWidth / 2;

  cards.forEach((card, index) => {
    const relativeX = wrapCentered((index * cardStep) - position, totalWidth);
    const x = containerCenterX - cardMarginLeft - (cardWidth / 2) + relativeX;
    const cardCenterX = x + cardMarginLeft + (cardWidth / 2);

    const dist = cardCenterX - containerCenterX;
    const abs = Math.abs(dist);
    const slotDistance = abs / cardStep;

    const centerBoost = 0.68 * Math.exp(-Math.pow(slotDistance / 0.82, 2));
    const neighborBoost = 0.18 * Math.exp(-Math.pow((slotDistance - 1) / 0.40, 2));
    const scaleX = 0.70 + centerBoost + neighborBoost;

    const centerHeightBoost = 0.24 * Math.exp(-Math.pow(slotDistance / 0.72, 2));
    const neighborHeightBoost = 0.06 * Math.exp(-Math.pow((slotDistance - 1) / 0.44, 2));
    const scaleY = scaleX + centerHeightBoost + neighborHeightBoost;

    const centerInfluence = Math.exp(-Math.pow(slotDistance / 0.95, 2));
    const neighborInfluence = 0.78 * Math.exp(-Math.pow((slotDistance - 1) / 0.48, 2));
    const visualInfluence = Math.max(centerInfluence, neighborInfluence);

    const centerLift = -10 * Math.exp(-Math.pow(slotDistance / 0.9, 2));
    const neighborLift = -24 * Math.exp(-Math.pow((slotDistance - 1) / 0.42, 2));
    const shoulderLift = -18 * Math.exp(-Math.pow((slotDistance - 1.8) / 1.0, 2));
    const outerLift = OUTER_LIFT * Math.exp(-Math.pow((slotDistance - 2.8) / 1.15, 2));
    const y = Math.pow(dist / 255, 2) * 4.8 + centerLift + neighborLift + shoulderLift + outerLift;

    const rotate = dist / 42;
    const opacity = 0.10 + (0.90 * Math.pow(visualInfluence, 1.35));

    card.style.left = `${x}px`;
    card.style.transform = `
      translateY(${y}px)
      scaleX(${scaleX})
      scaleY(${scaleY})
      rotateY(${rotate}deg)
    `;
    card.style.opacity = opacity;
    card.style.zIndex = Math.round((scaleY + visualInfluence) * 100);
  });
}

slider.addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG') {
    const card = e.target.closest('.card');
    if (!card) return;
    openModalForItem(Number(card.dataset.itemIndex));
  }
});

modalPrev.addEventListener('click', (e) => {
  e.stopPropagation();
  showPreviousModalImage();
});

modalNext.addEventListener('click', (e) => {
  e.stopPropagation();
  showNextModalImage();
});

modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    closeModal();
  }
});

window.addEventListener('keydown', (e) => {
  if (!modal.classList.contains('show')) return;

  if (e.key === 'ArrowLeft') {
    showPreviousModalImage();
  } else if (e.key === 'ArrowRight') {
    showNextModalImage();
  } else if (e.key === 'Escape') {
    closeModal();
  }
});
</script>

</body>
</html>
