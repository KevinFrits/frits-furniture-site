<script>
const slider = document.getElementById('slider');
const container = document.getElementById('container');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

/* BUILD (duplicate once only) */
for (let i = 0; i < 2; i++) {
  images.forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = src;

    card.appendChild(img);
    slider.appendChild(card);
  });
}

/* ===== TRUE INFINITE ENGINE ===== */
let position = 0;
let speed = 0;
const MAX_SPEED = 35;

let loopWidth = 0;

/* measure ONLY original set */
window.addEventListener('load', () => {
  const cards = slider.children.length / 2;
  loopWidth = slider.scrollWidth / 2;
});

/* mouse control */
container.addEventListener('mousemove', (e) => {
  const rect = container.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;

  speed = (percent - 0.5) * MAX_SPEED;
});

container.addEventListener('mouseleave', () => {
  speed = 0;
});

/* animation loop */
function animate() {
  position += speed;

  if (loopWidth) {
    // 🔥 PERFECT LOOP USING MODULO (NO EDGE CASES)
    position = position % loopWidth;
    if (position < 0) position += loopWidth;
  }

  slider.style.transform = `translateX(${-position}px)`;

  applyEffect();
  requestAnimationFrame(animate);
}

animate();

/* EFFECT */
function applyEffect() {
  const cards = document.querySelectorAll('.card');
  const center = window.innerWidth / 2;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const c = rect.left + rect.width / 2;
    const dist = c - center;
    const abs = Math.abs(dist);

    let scale = 1 - (abs / 500);
    scale = Math.max(0.7, Math.min(1.15, scale));

    let y = Math.pow(dist / 200, 2) * 10;
    let rotate = dist / 25;

    card.style.transform = `
      translateY(${y}px)
      scale(${scale})
      rotateY(${rotate}deg)
    `;

    card.style.opacity = 1 - (abs / 600);
    card.style.zIndex = Math.round(scale * 100);
  });
}

/* MODAL */
slider.addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG') {
    modal.classList.add('show');
    modalImg.src = e.target.src;
  }
});

modal.onclick = () => modal.classList.remove('show');
</script>
