<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* VIEWPORT */
.slider-container {
  width: 70%;
  margin: auto;
  overflow-x: scroll;
  overflow-y: hidden;
  white-space: nowrap;
  cursor: grab;
  scroll-behavior: auto;
}

.slider-container::-webkit-scrollbar {
  display: none;
}

/* ITEM */
.card {
  display: inline-block;
  width: 260px;
  height: 225px;
  margin: 0 -60px;
  border-radius: 14px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="hero">
  <div class="logo">Frits Furniture Design</div>
</div>

<div class="section">
  <h2 style="text-align:center;">Portfolio</h2>

  <div class="slider-container" id="slider"></div>
</div>

<script>
const slider = document.getElementById('slider');

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// 🔁 duplicate for seamless loop
function build() {
  for (let i = 0; i < 2; i++) {
    images.forEach(src => {
      const div = document.createElement('div');
      div.className = 'card';

      const img = document.createElement('img');
      img.src = src;

      div.appendChild(img);
      slider.appendChild(div);
    });
  }
}
build();

// wait for layout
window.addEventListener('load', () => {
  slider.scrollLeft = slider.scrollWidth / 4;
});

// ===== MOUSE CONTROLS SPEED =====
let speed = 0;

document.addEventListener('mousemove', (e) => {
  const x = e.clientX / window.innerWidth;
  speed = (x - 0.5) * 20; // adjust sensitivity
});

// ===== LOOP ENGINE =====
function animate() {
  slider.scrollLeft += speed;

  const max = slider.scrollWidth / 2;

  // 🔥 seamless reset
  if (slider.scrollLeft >= max) {
    slider.scrollLeft -= max;
  }
  if (slider.scrollLeft <= 0) {
    slider.scrollLeft += max;
  }

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
