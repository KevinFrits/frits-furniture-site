<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<style>
body {
  margin: 0;
  background: #fff;
  font-family: Arial;
  overflow-x: hidden;
}

.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  font-size: 40px;
}

/* VIEWPORT */
.viewport {
  width: 70%;
  margin: auto;
  overflow: hidden;
  position: relative;
  padding: 60px 0;
}

/* TRACK (this is the key) */
.track {
  display: flex;
  width: max-content;
  will-change: transform;
}

/* CARD */
.card {
  flex: 0 0 260px;
  height: 225px;
  margin: 0 -50px;
  border-radius: 14px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="hero">Frits Furniture Design</div>

<div class="viewport">
  <div class="track" id="track"></div>
</div>

<script>
const track = document.getElementById("track");

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// build 2 identical sets
function build() {
  for (let i = 0; i < 2; i++) {
    images.forEach(src => {
      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = src;

      card.appendChild(img);
      track.appendChild(card);
    });
  }
}
build();

let x = 0;
const speed = 0.6; // constant drift (smooth base motion)
let mouseInfluence = 0;

// mouse controls direction only
document.addEventListener("mousemove", (e) => {
  const percent = e.clientX / window.innerWidth;
  mouseInfluence = (percent - 0.5) * 2;
});

// wait for layout
let halfWidth = 0;

window.addEventListener("load", () => {
  halfWidth = track.scrollWidth / 2;
});

function animate() {
  x += speed + mouseInfluence * 2;

  // 🔥 seamless wrap WITHOUT visible jump
  if (halfWidth && x >= halfWidth) {
    x -= halfWidth;
  }

  if (halfWidth && x <= 0) {
    x += halfWidth;
  }

  track.style.transform = `translateX(${-x}px)`;

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
