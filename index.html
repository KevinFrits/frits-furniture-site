<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}
.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
}

/* SECTION */
.section {
  padding: 100px 0;
}

/* CONTAINER */
.slider-container {
  width: 70%;
  margin: auto;
  position: relative;
  overflow: visible;
}

/* SLIDER */
.grid {
  display: flex;
  overflow-x: auto;
  scroll-behavior: smooth;
  padding: 80px 0;
}
.grid::-webkit-scrollbar { display: none; }

/* CARDS */
.card {
  flex: 0 0 360px;
  height: 460px;
  margin-left: -120px; /* FORCE overlap */
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  transition: transform 0.25s ease, opacity 0.25s ease;
  transform: scale(0.8);
  opacity: 0.5;
}
.card:first-child {
  margin-left: 0;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 50;
}
.arrow.left { left: -25px; }
.arrow.right { right: -25px; }

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.modal img {
  max-width: 90%;
  max-height: 90%;
}
.modal.show {
  display: flex;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <div class="logo">Frits <span>FURNITURE DESIGN</span></div>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">Featured Pieces</h2>

  <div class="slider-container">
    <div class="arrow left" id="leftBtn">&#8249;</div>
    <div class="arrow right" id="rightBtn">&#8250;</div>

    <div class="grid" id="slider">

      <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg"></div>
      <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg"></div>
      <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"></div>
      <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg"></div>
      <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg"></div>

    </div>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
const slider = document.getElementById('slider');
const cards = document.querySelectorAll('.card');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

// ===== CENTER SNAP =====
function snapToCenter() {
  let closest = null;
  let closestDist = Infinity;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    const screenCenter = window.innerWidth / 2;
    const dist = Math.abs(center - screenCenter);

    if (dist < closestDist) {
      closestDist = dist;
      closest = card;
    }
  });

  if (closest) {
    const rect = closest.getBoundingClientRect();
    const offset = rect.left + rect.width / 2 - window.innerWidth / 2;
    slider.scrollBy({ left: offset, behavior: "smooth" });
  }
}

// ===== SCALE + 3D =====
slider.addEventListener('mousemove', (e) => {
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    const distance = e.clientX - center;

    const abs = Math.abs(distance);

    let scale = 1 - (abs / 500);
    scale = Math.max(0.7, Math.min(1.2, scale));

    let rotate = distance / 20;

    card.style.transform = `scale(${scale}) rotateY(${rotate}deg)`;
    card.style.opacity = 1 - (abs / 600);
    card.style.zIndex = Math.round(scale * 100);
  });
});

slider.addEventListener('mouseleave', snapToCenter);

// ===== ARROWS =====
document.getElementById('leftBtn').onclick = () => {
  slider.scrollBy({ left: -400, behavior: "smooth" });
};
document.getElementById('rightBtn').onclick = () => {
  slider.scrollBy({ left: 400, behavior: "smooth" });
};

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (e.key === "ArrowRight") slider.scrollBy({ left: 400, behavior: "smooth" });
  if (e.key === "ArrowLeft") slider.scrollBy({ left: -400, behavior: "smooth" });
});

// ===== MODAL =====
cards.forEach(card => {
  const img = card.querySelector('img');
  img.onclick = () => {
    modal.classList.add('show');
    modalImg.src = img.src;
  };
});

modal.onclick = () => modal.classList.remove('show');
</script>

</body>
</html>
