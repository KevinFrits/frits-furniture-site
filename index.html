<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* VIEWPORT */
.slider-container {
  width: 70%;
  margin: auto;
  overflow: hidden;
  position: relative;
}

/* TRACK */
.track {
  display: flex;
  width: max-content;
  will-change: transform;
}

/* CARD */
.card {
  flex: 0 0 260px;
  height: 225px;
  margin: 0 -60px;
  overflow: hidden;
  border-radius: 14px;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="hero">
  <div class="logo">Frits Furniture Design</div>
</div>

<div class="section">
  <h2 style="text-align:center;">Portfolio</h2>

  <div class="slider-container">
    <div class="track" id="track"></div>
  </div>
</div>

<script>
const track = document.getElementById('track');

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// 🔁 DUPLICATE TWICE (key to true infinite loop)
function build() {
  for (let i = 0; i < 2; i++) {
    images.forEach(src => {
      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.src = src;

      card.appendChild(img);
      track.appendChild(card);
    });
  }
}
build();

let x = 0;
const speedBase = 0.5;

// measure half width AFTER layout is stable
let halfWidth = 0;

window.addEventListener('load', () => {
  halfWidth = track.scrollWidth / 2;
});

// mouse controls
document.addEventListener('mousemove', (e) => {
  const percent = e.clientX / window.innerWidth;
  const direction = percent - 0.5;

  x += direction * 10;
});

// animation loop
function animate() {
  x -= speedBase;

  // 🔥 seamless loop reset (NO jump visible)
  if (halfWidth > 0 && Math.abs(x) >= halfWidth) {
    x = 0;
  }

  track.style.transform = `translateX(${x}px)`;

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
