<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #111;
  overflow-x: hidden;
}

/* HERO (RESTORED ORIGINAL STYLE) */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  top: -20%;
  left: 0;
  width: 100%;
  height: 140%;
  background-image: url("https://fritsfurnituredesign.com/Images/hero.jpg");
  background-size: cover;
  background-position: center;
}

.hero-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
}

.hero-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 48px;
  margin: 0;
  font-family: Georgia, serif;
  font-weight: 400;
  letter-spacing: 1px;
}

.hero p {
  font-size: 18px;
  opacity: 0.9;
}

/* SECTION */
.section {
  padding: 90px 20px;
  max-width: 1100px;
  margin: auto;
  text-align: center;
}

/* SIMPLE CAROUSEL (STABLE) */
.carousel {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding: 20px;
  scroll-snap-type: x mandatory;
}

.carousel::-webkit-scrollbar {
  display: none;
}

.card {
  min-width: 280px;
  height: 220px;
  flex: 0 0 auto;
  border-radius: 12px;
  overflow: hidden;
  scroll-snap-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BEFORE AFTER */
.ba {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.ba img {
  width: 100%;
  max-width: 480px;
  border-radius: 12px;
}

/* CONTACT */
.contact {
  text-align: center;
  padding: 80px 20px;
  background: #f7f7f7;
}

button {
  padding: 14px 24px;
  border: none;
  background: #111;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- HERO (RESTORED LOGO) -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1>Frits Furniture Design</h1>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<!-- PORTFOLIO (WORKING CAROUSEL) -->
<div class="section">
  <h2>Portfolio</h2>

  <div class="carousel">
    <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg"></div>
    <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg"></div>
    <div class="card"><img src="https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"></div>
  </div>
</div>

<!-- BEFORE AFTER -->
<div class="section">
  <h2>Restoration Work</h2>

  <div class="ba">
    <img src="https://fritsfurnituredesign.com/Images/PXL_20260412_014229567~2.jpg">
    <img src="https://fritsfurnituredesign.com/Images/PXL_20251222_212118115~2.jpg">
  </div>
</div>

<!-- CONTACT -->
<div class="contact">
  <h2>Interested in a piece?</h2>
  <p>Message me to check availability or custom work.</p>
  <button onclick="window.location.href='https://facebook.com'">
    Message on Facebook
  </button>
</div>

<script>
// optional smooth auto scroll (very stable)
const carousel = document.querySelector('.carousel');

let speed = 0.3;

function animate() {
  carousel.scrollLeft += speed;

  // loop safely (no jump feeling because scroll snap smooths it)
  if (carousel.scrollLeft >= carousel.scrollWidth - carousel.clientWidth) {
    carousel.scrollLeft = 0;
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
