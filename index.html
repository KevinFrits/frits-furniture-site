<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-size: 56px;
  font-family: serif;
}

/* SECTION */
.section {
  padding: 80px 0;
  text-align: center;
}

/* SCROLLER */
.scroller {
  width: 70%;
  margin: auto;
  overflow-x: auto;
  overflow-y: hidden;
  display: flex;
  scroll-behavior: auto;
  cursor: grab;
}

.scroller::-webkit-scrollbar {
  display: none;
}

/* ITEMS */
.card {
  flex: 0 0 260px;
  height: 225px;
  margin: 0 -50px;
  border-radius: 14px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="hero">
  <div class="logo">Frits Furniture Design</div>
</div>

<div class="section">
  <h2>Portfolio</h2>

  <div class="scroller" id="scroller"></div>
</div>

<script>
const scroller = document.getElementById('scroller');

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// duplicate content for seamless feel
for (let i = 0; i < 5; i++) {
  images.forEach(src => {
    const div = document.createElement('div');
    div.className = 'card';

    const img = document.createElement('img');
    img.src = src;

    div.appendChild(img);
    scroller.appendChild(div);
  });
}

// start in middle
window.addEventListener('load', () => {
  scroller.scrollLeft = scroller.scrollWidth / 3;
});

// mouse speed control
let speed = 0;

scroller.addEventListener('mousemove', (e) => {
  const rect = scroller.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;

  speed = (x - 0.5) * 15;
});

scroller.addEventListener('mouseleave', () => {
  speed = 0;
});

// SAFE LOOP (no glitches possible)
function animate() {
  scroller.scrollLeft += speed;

  const max = scroller.scrollWidth / 3;

  if (scroller.scrollLeft > max * 2) {
    scroller.scrollLeft = max;
  }

  if (scroller.scrollLeft < max) {
    scroller.scrollLeft = max * 2;
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
