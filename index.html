<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
}
.logo span {
  display: block;
  font-size: 14px;
  letter-spacing: 6px;
}

/* SECTION */
.section {
  padding: 80px 0;
}

/* CONTAINER */
.slider-container {
  width: 70%;
  margin: auto;
  overflow: hidden;
  position: relative;
}

/* SLIDER */
.grid {
  display: flex;
  gap: 0;
  padding: 40px 0; /* reduced height */
  overflow-x: auto;
  scroll-behavior: smooth;
}
.grid::-webkit-scrollbar { display: none; }

/* CARDS (SHORTER) */
.card {
  flex: 0 0 260px; /* smaller width */
  height: 300px;   /* MUCH shorter */
  margin-left: -80px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  transition: transform 0.25s ease, opacity 0.25s ease;
}
.card:first-child {
  margin-left: 0;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* HOVER SCROLL ZONES */
.hover-zone {
  position: absolute;
  top: 0;
  width: 100px;
  height: 100%;
  z-index: 10;
}
.hover-zone.left { left: 0; }
.hover-zone.right { right: 0; }

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}
.modal img {
  max-width: 90%;
  max-height: 90%;
}
.modal.show {
  display: flex;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <div class="logo">Frits <span>FURNITURE DESIGN</span></div>
    <p>Modern Restored Furniture • Dallas, Texas</p>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">Featured Pieces</h2>

  <div class="slider-container">
    <div class="hover-zone left"></div>
    <div class="hover-zone right"></div>

    <div class="grid" id="slider"></div>
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
const slider = document.getElementById('slider');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

// ===== IMAGES =====
const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg"
];

// build cards
images.forEach(src => {
  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = src;

  card.appendChild(img);
  slider.appendChild(card);
});

// duplicate for infinite
slider.innerHTML += slider.innerHTML;

// ===== HOVER SCROLL =====
const leftZone = document.querySelector('.hover-zone.left');
const rightZone = document.querySelector('.hover-zone.right');

let direction = 0;
let speed = 0;
const MAX_SPEED = 15;

function animateScroll() {
  if (direction !== 0) {
    slider.scrollLeft += direction * speed;
  }
  requestAnimationFrame(animateScroll);
}
animateScroll();

function handleMove(e, dir) {
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const width = rect.width;

  let intensity = dir === 1 ? x / width : 1 - (x / width);
  speed = Math.max(1, intensity * MAX_SPEED);
  direction = dir;
}

function stopScroll() {
  direction = 0;
  speed = 0;
}

rightZone.addEventListener('mousemove', (e) => handleMove(e, 1));
leftZone.addEventListener('mousemove', (e) => handleMove(e, -1));
rightZone.addEventListener('mouseleave', stopScroll);
leftZone.addEventListener('mouseleave', stopScroll);

// ===== RING EFFECT =====
slider.addEventListener('mousemove', (e) => {
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    const dist = e.clientX - center;
    const abs = Math.abs(dist);

    let scale = 1 - (abs / 400);
    scale = Math.max(0.7, Math.min(1.15, scale));

    let y = Math.pow(dist / 200, 2) * 15;
    let rotate = dist / 25;

    card.style.transform = `
      translateY(${y}px)
      scale(${scale})
      rotateY(${rotate}deg)
    `;

    card.style.opacity = 1 - (abs / 600);
    card.style.zIndex = Math.round(scale * 100);
  });
});

// ===== MODAL =====
document.addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG') {
    modal.classList.add('show');
    modalImg.src = e.target.src;
  }
});

modal.onclick = () => modal.classList.remove('show');
</script>

</body>
</html>
