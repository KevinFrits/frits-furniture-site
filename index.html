<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frits Furniture Design</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url("https://fritsfurnituredesign.com/Images/hero.jpg") center/cover;
  color: white;
  text-align: center;
}

.logo {
  font-size: 56px;
  font-family: serif;
}

/* SECTION */
.section {
  padding: 80px 0;
  text-align: center;
}

/* SCROLLER */
.scroller {
  width: 70%;
  margin: auto;
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-behavior: auto;
}

.scroller::-webkit-scrollbar {
  display: none;
}

/* CARDS */
.card {
  flex: 0 0 260px;
  height: 225px;
  margin: 0 -50px;
  border-radius: 14px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="hero">
  <div class="logo">Frits Furniture Design</div>
</div>

<div class="section">
  <h2>Portfolio</h2>

  <div class="scroller" id="scroller"></div>
</div>

<script>
const scroller = document.getElementById('scroller');

const images = [
  "https://fritsfurnituredesign.com/Images/PXL_20250504_191031269.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260208_182315496.jpg",
  "https://fritsfurnituredesign.com/Images/PXL_20260329_151518426.jpg"
];

// build twice (infinite illusion)
for (let i = 0; i < 2; i++) {
  images.forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = src;

    card.appendChild(img);
    scroller.appendChild(card);
  });
}

// start in middle
window.addEventListener('load', () => {
  scroller.scrollLeft = scroller.scrollWidth / 2;
});

// simple mouse-driven scroll (NO physics)
scroller.addEventListener('mousemove', (e) => {
  const rect = scroller.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;

  scroller.scrollLeft += (x - 0.5) * 10;
});
</script>

</body>
</html>
